<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Interactive Course - Learn by Doing</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      overflow: hidden;
    }

    .container {
      display: grid;
      grid-template-columns: 30% 35% 35%;
      height: 100vh;
      gap: 1px;
      background: rgba(148, 163, 184, 0.1);
    }

    .panel {
      background: #0f172a;
      overflow-y: auto;
      border-right: 1px solid rgba(148, 163, 184, 0.2);
    }

    .panel:last-child {
      border-right: none;
    }

    /* Left Panel - Lessons */
    .lessons-panel {
      padding: 30px;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    }

    .lessons-panel h1 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 5px;
    }

    .lesson-subtitle {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 25px;
    }

    .lesson-content {
      display: none;
    }

    .lesson-content.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .lesson-content h2 {
      font-size: 1.3rem;
      color: #60a5fa;
      margin: 20px 0 15px 0;
    }

    .lesson-content h3 {
      font-size: 1.1rem;
      color: #a78bfa;
      margin: 15px 0 10px 0;
    }

    .lesson-content p {
      margin-bottom: 12px;
      line-height: 1.7;
      color: #cbd5e1;
    }

    .lesson-content code {
      background: rgba(15, 23, 42, 0.8);
      color: #fbbf24;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
      font-family: monospace;
    }

    .lesson-content ul {
      margin-left: 20px;
      margin-bottom: 12px;
    }

    .lesson-content li {
      margin-bottom: 6px;
      color: #cbd5e1;
    }

    .lesson-content strong {
      color: #60a5fa;
      font-weight: 600;
    }

    .lesson-nav {
      display: flex;
      gap: 10px;
      margin-top: 30px;
      border-top: 1px solid rgba(148, 163, 184, 0.2);
      padding-top: 20px;
    }

    .lesson-nav button {
      flex: 1;
      padding: 10px;
      background: rgba(96, 165, 250, 0.1);
      color: #60a5fa;
      border: 1px solid rgba(96, 165, 250, 0.3);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 600;
    }

    .lesson-nav button:hover {
      background: rgba(96, 165, 250, 0.2);
    }

    .lesson-nav button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Middle Panel - Code */
    .code-panel {
      display: flex;
      flex-direction: column;
      background: #1e293b;
      border-right: 1px solid rgba(148, 163, 184, 0.2);
    }

    .code-header {
      background: rgba(30, 41, 59, 0.9);
      padding: 15px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      font-weight: 600;
      color: #60a5fa;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 1px;
    }

    #codeEditor {
      flex: 1;
      background: #1e293b;
      color: #e2e8f0;
      border: none;
      padding: 15px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.5;
      resize: none;
      outline: none;
    }

    #codeEditor::placeholder {
      color: #475569;
    }

    .code-controls {
      padding: 15px;
      border-top: 1px solid rgba(148, 163, 184, 0.2);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .code-btn {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .code-btn-run {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      flex: 1;
    }

    .code-btn-run:hover {
      transform: translateY(-1px);
      box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
    }

    .code-btn-reset {
      background: rgba(148, 163, 184, 0.1);
      color: #cbd5e1;
      border: 1px solid rgba(148, 163, 184, 0.2);
      flex: 0.8;
    }

    .code-btn-reset:hover {
      background: rgba(148, 163, 184, 0.2);
    }

    .code-btn-html {
      background: rgba(249, 115, 22, 0.1);
      color: #fb923c;
      border: 1px solid rgba(249, 115, 22, 0.3);
      flex: 0.8;
    }

    .code-btn-html:hover {
      background: rgba(249, 115, 22, 0.2);
    }

    /* Right Panel - Preview */
    .preview-panel {
      display: flex;
      flex-direction: column;
      background: #111827;
      position: relative;
    }

    .preview-header {
      background: rgba(30, 41, 59, 0.9);
      padding: 15px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      font-weight: 600;
      color: #60a5fa;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 1px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .preview-status {
      font-size: 0.75rem;
      color: #94a3b8;
    }

    #preview {
      flex: 1;
      border: none;
      background: #0f172a;
    }

    .html-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .html-modal.active {
      display: flex;
    }

    .html-modal-content {
      background: #1e293b;
      border-radius: 10px;
      padding: 30px;
      width: 100%;
      max-width: 800px;
      max-height: 80vh;
      overflow: auto;
      color: #e2e8f0;
    }

    .html-modal-header {
      font-size: 1.3rem;
      margin-bottom: 15px;
      color: #60a5fa;
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      padding-bottom: 15px;
    }

    .html-modal pre {
      background: #0f172a;
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 6px;
      padding: 15px;
      overflow-x: auto;
      font-size: 12px;
    }

    .html-modal code {
      color: #e2e8f0;
    }

    .html-modal-close {
      background: rgba(148, 163, 184, 0.1);
      color: #cbd5e1;
      border: 1px solid rgba(148, 163, 184, 0.2);
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 15px;
    }

    .chapter-selector {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 25px 0;
      padding: 15px 0;
      border-top: 1px solid rgba(148, 163, 184, 0.2);
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
    }

    .chapter-btn {
      padding: 8px;
      background: rgba(96, 165, 250, 0.1);
      color: #60a5fa;
      border: 1px solid rgba(96, 165, 250, 0.2);
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s ease;
    }

    .chapter-btn:hover {
      background: rgba(96, 165, 250, 0.2);
    }

    .chapter-btn.active {
      background: rgba(96, 165, 250, 0.3);
      border-color: rgba(96, 165, 250, 0.5);
      font-weight: 600;
    }

    .info-box {
      background: rgba(59, 130, 246, 0.1);
      border-left: 3px solid #3b82f6;
      padding: 12px;
      border-radius: 4px;
      margin: 15px 0;
      font-size: 0.9rem;
    }

    .info-box strong {
      color: #3b82f6;
    }

    @media (max-width: 1400px) {
      .container {
        grid-template-columns: 35% 65%;
      }
      
      .preview-panel {
        display: none;
      }

      .lessons-panel {
        grid-column: 1;
      }

      .code-panel {
        grid-column: 2;
      }
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }

      .panel {
        border-right: none;
        border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      }

      .lessons-panel {
        grid-column: 1;
        max-height: 35vh;
      }

      .code-panel {
        grid-column: 1;
        max-height: 32.5vh;
      }

      .preview-panel {
        display: flex;
        grid-column: 1;
        max-height: 32.5vh;
      }
    }

    .error-text {
      color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      padding: 10px;
      border-radius: 4px;
      margin: 10px 0;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Left Panel: Lessons -->
    <div class="panel lessons-panel">
      <h1>Three.js Mastery</h1>
      <div class="lesson-subtitle">Learn by writing code</div>

      <div class="chapter-selector" id="chapterSelector"></div>

      <div id="lessonsContainer"></div>
    </div>

    <!-- Middle Panel: Code Editor -->
    <div class="panel code-panel">
      <div class="code-header">✎ Write Your Code</div>
      <textarea id="codeEditor" placeholder="Edit code here..."></textarea>
      <div class="code-controls">
        <button class="code-btn code-btn-run" onclick="runCode()">▶ Run Code</button>
        <button class="code-btn code-btn-reset" onclick="resetCode()">↻ Reset</button>
        <button class="code-btn code-btn-html" onclick="showFullHTML()">📄 Full HTML</button>
      </div>
    </div>

    <!-- Right Panel: Preview -->
    <div class="panel preview-panel">
      <div class="preview-header">
        Live Preview
        <span class="preview-status" id="previewStatus">Ready</span>
      </div>
      <iframe id="preview"></iframe>
    </div>
  </div>

  <!-- HTML Modal -->
  <div class="html-modal" id="htmlModal">
    <div class="html-modal-content">
      <div class="html-modal-header">Full HTML Output</div>
      <pre><code id="htmlCode"></code></pre>
      <button class="html-modal-close" onclick="closeHTMLModal()">Close</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    // Lesson data
    const lessons = [
      {
        chapter: 1,
        title: "Your First Three.js Scene",
        lessons: [
          {
            id: "1-1",
            title: "Understanding Variables",
            content: `
              <h2>What are Variables?</h2>
              <p>A variable is a container that stores a value. Think of it like a box where you can put something and label it.</p>
              
              <h3>Creating Variables</h3>
              <p>In JavaScript, you create variables using <code>const</code>, <code>let</code>, or <code>var</code>:</p>
              <ul>
                <li><code>const</code> - constant value (doesn't change)</li>
                <li><code>let</code> - can be changed</li>
                <li><code>var</code> - old style (avoid)</li>
              </ul>

              <div class="info-box">
                <strong>Pro Tip:</strong> Use <code>const</code> by default. Only use <code>let</code> if the value needs to change.
              </div>

              <h3>Example Code</h3>
              <p>The code editor shows:</p>
              <ul>
                <li><code>const renderer = new THREE.WebGLRenderer()</code> - creates a renderer (stores in a box)</li>
                <li><code>const scene = new THREE.Scene()</code> - creates a scene</li>
                <li><code>const camera = new THREE.PerspectiveCamera(...)</code> - creates a camera</li>
              </ul>
            `,
            code: `// Create a WebGL renderer - this draws 3D graphics
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Create a scene - the 3D world container
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f172a);

// Create a camera - our viewpoint
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.z = 5;

// Create a cube
const geometry = new THREE.BoxGeometry(1, 1, 1);
const material = new THREE.MeshBasicMaterial({ color: 0x00ff88 });
const cube = new THREE.Mesh(geometry, material);
scene.add(cube);

// Render the scene
renderer.render(scene, camera);`
          },
          {
            id: "1-2",
            title: "Understanding Functions",
            content: `
              <h2>What are Functions?</h2>
              <p>A function is a reusable block of code. Instead of writing the same code over and over, you write it once in a function.</p>

              <h3>Creating Functions</h3>
              <p>Use the <code>function</code> keyword:</p>
              <ul>
                <li><code>function myFunction() { }</code> - creates a function</li>
                <li>Call it with <code>myFunction()</code></li>
              </ul>

              <div class="info-box">
                <strong>Why use functions?</strong> To avoid repeating code and to organize your program into logical pieces.
              </div>

              <h3>Parameters</h3>
              <p>Functions can accept values called parameters:</p>
              <ul>
                <li><code>function add(a, b) { return a + b; }</code></li>
                <li><code>add(2, 3)</code> returns <code>5</code></li>
              </ul>
            `,
            code: `const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f172a);

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.z = 5;

// Function to create a mesh
function createCube(color, x, y, z) {
  const geometry = new THREE.BoxGeometry(1, 1, 1);
  const material = new THREE.MeshBasicMaterial({ color: color });
  const mesh = new THREE.Mesh(geometry, material);
  mesh.position.set(x, y, z);
  scene.add(mesh);
  return mesh;
}

// Use the function to create multiple cubes
createCube(0x00ff88, -2, 0, 0);
createCube(0xff6b9d, 0, 0, 0);
createCube(0x4ecdc4, 2, 0, 0);

renderer.render(scene, camera);`
          },
          {
            id: "1-3",
            title: "Animation Loop",
            content: `
              <h2>What is requestAnimationFrame?</h2>
              <p>It's the browser's way of saying "I'm about to paint the screen, do you have anything to draw?"</p>

              <h3>Creating Animation</h3>
              <p>To animate, you call <code>requestAnimationFrame(animate)</code> repeatedly:</p>
              <ul>
                <li>Browser calls your function before refreshing</li>
                <li>You update objects</li>
                <li>You render the scene</li>
                <li>You call requestAnimationFrame again</li>
              </ul>

              <div class="info-box">
                <strong>Remember:</strong> Nothing moves unless you render each frame!
              </div>

              <h3>Delta Time</h3>
              <p>Use time to make movement consistent across all devices.</p>
            `,
            code: `const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f172a);

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.z = 5;

const geometry = new THREE.BoxGeometry(1, 1, 1);
const material = new THREE.MeshBasicMaterial({ color: 0x00ff88 });
const cube = new THREE.Mesh(geometry, material);
scene.add(cube);

// Create a clock to measure time
const clock = new THREE.Clock();

// Animation function
function animate() {
  // Request the next frame
  requestAnimationFrame(animate);

  // Get elapsed time
  const elapsed = clock.getElapsedTime();

  // Update the cube
  cube.rotation.x = elapsed;
  cube.rotation.y = elapsed * 1.5;

  // Render
  renderer.render(scene, camera);
}

// Start the animation
animate();`
          }
        ]
      },
      {
        chapter: 2,
        title: "Transformations & Hierarchy",
        lessons: [
          {
            id: "2-1",
            title: "Position, Rotation, Scale",
            content: `
              <h2>Moving Objects in 3D Space</h2>
              <p>Every object in Three.js has three transformation properties:</p>

              <h3>Position</h3>
              <p><code>object.position</code> - where the object is in 3D space (x, y, z)</p>
              <ul>
                <li><code>cube.position.x = 2</code> - move right</li>
                <li><code>cube.position.y = 1</code> - move up</li>
                <li><code>cube.position.z = -3</code> - move forward</li>
              </ul>

              <h3>Rotation</h3>
              <p><code>object.rotation</code> - how the object is oriented (in radians)</p>
              <ul>
                <li><code>cube.rotation.x = Math.PI / 2</code> - rotate around x axis</li>
                <li>Use <code>Math.PI</code> for circular rotations</li>
              </ul>

              <h3>Scale</h3>
              <p><code>object.scale</code> - how big the object is</p>
              <ul>
                <li><code>cube.scale.set(2, 1, 0.5)</code> - stretch different directions</li>
              </ul>
            `,
            code: `const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f172a);

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.z = 8;

// Create cube 1
const geo1 = new THREE.BoxGeometry(1, 1, 1);
const mat1 = new THREE.MeshBasicMaterial({ color: 0x60a5fa });
const cube1 = new THREE.Mesh(geo1, mat1);
cube1.position.x = -2;
scene.add(cube1);

// Create cube 2
const geo2 = new THREE.BoxGeometry(1, 1, 1);
const mat2 = new THREE.MeshBasicMaterial({ color: 0xff7a59 });
const cube2 = new THREE.Mesh(geo2, mat2);
cube2.scale.set(1.5, 1, 1);
scene.add(cube2);

// Create cube 3
const geo3 = new THREE.BoxGeometry(1, 1, 1);
const mat3 = new THREE.MeshBasicMaterial({ color: 0x22c55e });
const cube3 = new THREE.Mesh(geo3, mat3);
cube3.position.x = 2;
scene.add(cube3);

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  cube1.rotation.y = t;
  cube2.rotation.x = t;
  cube3.rotation.z = t;

  renderer.render(scene, camera);
}

animate();`
          }
        ]
      }
    ];

    let currentChapter = 1;
    let currentLesson = 0;
    let originalCode = '';
    let generatedHTML = '';

    function renderChapterSelector() {
      const selector = document.getElementById('chapterSelector');
      const uniqueChapters = [...new Set(lessons.map(l => l.chapter))];

      uniqueChapters.forEach(ch => {
        const btn = document.createElement('button');
        btn.className = 'chapter-btn';
        if (ch === currentChapter) btn.classList.add('active');
        btn.textContent = `Ch ${ch}`;
        btn.onclick = () => selectChapter(ch);
        selector.appendChild(btn);
      });
    }

    function selectChapter(chapterNum) {
      currentChapter = chapterNum;
      currentLesson = 0;
      renderLessons();
      updateChapterButtons();
    }

    function updateChapterButtons() {
      document.querySelectorAll('.chapter-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      document.querySelectorAll('.chapter-btn')[currentChapter - 1].classList.add('active');
    }

    function renderLessons() {
      const chapter = lessons.find(l => l.chapter === currentChapter);
      const container = document.getElementById('lessonsContainer');
      container.innerHTML = '';

      chapter.lessons.forEach((lesson, index) => {
        const div = document.createElement('div');
        div.className = `lesson-content ${index === currentLesson ? 'active' : ''}`;
        div.id = `lesson-${lesson.id}`;
        div.innerHTML = lesson.content;
        container.appendChild(div);
      });

      loadLessonCode(chapter.lessons[currentLesson].code);
      renderLessonButtons(chapter.lessons.length);
    }

    function renderLessonButtons(totalLessons) {
      const container = document.getElementById('lessonsContainer');
      const navDiv = document.createElement('div');
      navDiv.className = 'lesson-nav';

      const prevBtn = document.createElement('button');
      prevBtn.textContent = '← Previous';
      prevBtn.disabled = currentLesson === 0;
      prevBtn.onclick = () => navigateLessonLesson(-1);

      const nextBtn = document.createElement('button');
      nextBtn.textContent = 'Next →';
      nextBtn.disabled = currentLesson === totalLessons - 1;
      nextBtn.onclick = () => navigateLessonLesson(1);

      navDiv.appendChild(prevBtn);
      navDiv.appendChild(nextBtn);
      container.appendChild(navDiv);
    }

    function navigateLessonLesson(direction) {
      const chapter = lessons.find(l => l.chapter === currentChapter);
      const newIndex = currentLesson + direction;

      if (newIndex >= 0 && newIndex < chapter.lessons.length) {
        currentLesson = newIndex;
        document.querySelectorAll('.lesson-content').forEach((el, index) => {
          el.classList.toggle('active', index === newIndex);
        });
        loadLessonCode(chapter.lessons[newIndex].code);
        renderLessonButtons(chapter.lessons.length);
      }
    }

    function loadLessonCode(code) {
      document.getElementById('codeEditor').value = code;
      originalCode = code;
      runCode();
    }

    function runCode() {
      const code = document.getElementById('codeEditor').value;
      const status = document.getElementById('previewStatus');

      try {
        status.textContent = 'Running...';
        status.style.color = '#fbbf24';

        const htmlContent = `
          <!DOCTYPE html>
          <html>
          <head>
            <style>
              body { margin: 0; overflow: hidden; background: #111827; }
              canvas { display: block; }
            </style>
          </head>
          <body>
            <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"><\/script>
            <script type="module">
              import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
              ${code}
            <\/script>
          </body>
          </html>
        `;

        generatedHTML = htmlContent;

        const blob = new Blob([htmlContent], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        document.getElementById('preview').src = url;

        status.textContent = 'Ready';
        status.style.color = '#10b981';
      } catch (error) {
        status.textContent = 'Error';
        status.style.color = '#ef4444';
        console.error(error);
      }
    }

    function resetCode() {
      document.getElementById('codeEditor').value = originalCode;
      runCode();
    }

    function showFullHTML() {
      const codeBlock = document.getElementById('htmlCode');
      codeBlock.textContent = generatedHTML;
      hljs.highlightElement(codeBlock);
      document.getElementById('htmlModal').classList.add('active');
    }

    function closeHTMLModal() {
      document.getElementById('htmlModal').classList.remove('active');
    }

    renderChapterSelector();
    renderLessons();
  </script>
</body>
</html>
